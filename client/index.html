<!doctype html>
<html lang="en" data-color-scheme="auto" data-theme="dilps-production" data-is-dark="false">
    <head>
        <meta charset="utf-8" />
        <title></title>
        <base href="/" />

        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link id="favIcon" rel="icon" type="image/x-icon" href="favicon-dilps.svg" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:FILL@1" />
    </head>
    <body>
        <app-root>
            <div class="bootloader">
                <div class="sk-folding-cube">
                    <div class="sk-cube1 sk-cube"></div>
                    <div class="sk-cube2 sk-cube"></div>
                    <div class="sk-cube4 sk-cube"></div>
                    <div class="sk-cube3 sk-cube"></div>
                </div>
            </div>
        </app-root>

        <script>
            window.APP_SITE = window.location.hostname.includes('tiresias') ? 'Tiresias' : 'Dilps';

            const scheme = localStorage.getItem('color-scheme');
            if (scheme) {
                window.document.documentElement.setAttribute('data-color-scheme', scheme);
            }

            const dark =
                scheme === 'dark' || (scheme !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            window.document.documentElement.setAttribute('data-is-dark', dark ? 'true' : 'false');
        </script>
    </body>
</html>
