<app-stamp class="nat-expand" [item]="item" />
<div class="nat-horizontal nat-bottom">
    @if (!readOnly() && item.id && item.permissions?.delete) {
        <button color="error" matButton="outlined" (click)="delete.emit(item)">
            <mat-icon naturalIcon="delete_forever" />
            Supprimer
        </button>
    }

    <div class="nat-expand"></div>
    <button matButton="outlined" mat-dialog-close cdkFocusInitial>{{ readOnly() ? 'Fermer' : 'Annuler' }}</button>
    @if (!readOnly()) {
        @if (item.id && item.permissions?.update) {
            <button
                color="primary"
                matButton="filled"
                [disabled]="!!formCtrl()?.errors || disableCreateAndUpdate()"
                (click)="update.emit(item)"
            >
                <mat-icon naturalIcon="save" />
                Enregistrer
            </button>
        }

        @if (!item.id && canCreate()) {
            <button
                color="primary"
                matButton="filled"
                [disabled]="!!formCtrl()?.errors || disableCreateAndUpdate()"
                (click)="create.emit(item)"
            >
                <mat-icon naturalIcon="add" />
                Ajouter
            </button>
        }
    }
</div>
