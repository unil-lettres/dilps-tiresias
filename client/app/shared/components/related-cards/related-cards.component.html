<div class="root" [hidden]="breakpointXSmall || cards.length === 0" [class.reduced]="isReduced()">
    <div class="wrapper">
        <div #slideshow class="slideshow" (scroll)="updateButtonsState()">
            @for (card of cards; track card) {
                <div>
                    <a class="image" [routerLink]="['/card', card.id]" [matTooltip]="card.plainName">
                        <img priority fill [ngSrc]="`card-${card.id}.jpg`" [loaderParams]="{card: card}" />
                    </a>
                </div>
            }
        </div>
        <button
            class="left nat-rounded"
            matMiniFab
            [disabled]="scrollBarAtLeft()"
            [hidden]="!hasScrollbar()"
            (click)="scrollLeft()"
        >
            <mat-icon naturalIcon="navigate_before" />
        </button>
        <button
            class="right nat-rounded"
            matMiniFab
            [disabled]="scrollBarAtRight()"
            [hidden]="!hasScrollbar()"
            (click)="scrollRight()"
        >
            <mat-icon naturalIcon="navigate_next" />
        </button>
    </div>
    <button
        class="btn-reduce nat-rounded"
        matMiniFab
        color="tertiary"
        matTooltipPosition="left"
        [matTooltip]="`${isReduced() ? 'Ouvrir' : 'Fermer'} les images associées`"
        (click)="toggleReduce()"
    >
        <mat-icon naturalIcon="expand_more" />
    </button>
</div>
