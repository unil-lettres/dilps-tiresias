<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content [innerHTML]="data.message" />
<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>{{ data.cancelText }}</button>
    <button [matButton]="data.confirmButtonType || ''" [mat-dialog-close]="true" [color]="data.confirmButtonColor">
        {{ data.confirmText }}
    </button>
</mat-dialog-actions>
