@if (collection().hierarchicName !== collection().name) {
    <div class="mat-font-body-sm">
        @if (immediateAncestor() !== lastAncestor()) {
            <span>
                {{ lastAncestor() }}
                @if (!tooltipContent()) {
                    <span> > </span>
                }
            </span>
        }
        @if (tooltipContent()) {
            <span [matTooltip]="tooltipContent()"> > ... > </span>
        }
        <span>{{ immediateAncestor() }}</span>
    </div>
}
