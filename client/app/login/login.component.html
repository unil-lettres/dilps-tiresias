<div class="nat-horizontal nat-center">
    <div class="login nat-vertical">
        <div class="nat-vertical nat-gap-15">
            <app-logo [data]="{type: 'main', class: 'logo-main'}" />

            <mat-divider />

            <div class="login-info nat-gap-15 nat-vertical">
                Veuillez choisir une méthode d'authentification ou
                <br />
                utiliser le bouton "Accès public"
            </div>

            <mat-grid-list cols="2" rowHeight="80px">
                <mat-grid-tile>
                    <a
                        matButton="elevated"
                        class="shib-link"
                        [href]="`${baseUrl}/Shibboleth.sso/Login?target=${encodeUrl(baseUrl)}%2Fauth?returnUrl=${encodeUrl(returnUrl)}&entityID=https%3A%2F%2Faai.unil.ch%2Fidp%2Fshibboleth`"
                    >
                        <img class="nat-for-dark" src="assets/images/logo-unil-dark.svg" width="130" />
                        <img class="nat-for-light" src="assets/images/logo-unil.svg" width="130" />
                    </a>
                </mat-grid-tile>
                <mat-grid-tile>
                    <a
                        matButton="elevated"
                        class="shib-link"
                        [href]="`${baseUrl}/Shibboleth.sso/Login?target=${encodeUrl(baseUrl)}%2Fauth?returnUrl=${encodeUrl(returnUrl)}&entityID=https%3A%2F%2Faai-login.unine.ch%2Fidp%2Fshibboleth`"
                    >
                        <img class="nat-for-dark" src="assets/images/logo-unine-dark.svg" width="100" />
                        <img class="nat-for-light" src="assets/images/logo-unine.svg" width="100" />
                    </a>
                </mat-grid-tile>
            </mat-grid-list>

            <mat-divider />

            <mat-expansion-panel>
                <mat-expansion-panel-header>
                    <mat-panel-title> Utilisateur externe </mat-panel-title>
                </mat-expansion-panel-header>

                <form class="nat-vertical">
                    <mat-form-field>
                        <mat-label>Login</mat-label>
                        <input
                            autofocus
                            matInput
                            name="login"
                            required="required"
                            [disabled]="loading"
                            [(ngModel)]="loginForm.login"
                            (focus)="snackBar.dismiss()"
                        />
                    </mat-form-field>
                    <mat-form-field>
                        <mat-label>Password</mat-label>
                        <input
                            matInput
                            name="password"
                            required="required"
                            type="password"
                            autocorrect="off"
                            autocapitalize="off"
                            spellcheck="false"
                            [disabled]="loading"
                            [(ngModel)]="loginForm.password"
                            (focus)="snackBar.dismiss()"
                        />
                    </mat-form-field>

                    <button
                        color="primary"
                        matButton="filled"
                        type="submit"
                        [disabled]="loading || !loginForm.login || !loginForm.password"
                        (click)="login()"
                    >
                        Se connecter
                    </button>
                </form>
            </mat-expansion-panel>

            @if (site === Site.Tiresias) {
                <div class="nat-vertical nat-gap-15">
                    <mat-divider />
                    <a matButton="filled" (click)="userService.startTempAccess()"> Accès public </a>
                </div>
            }
        </div>
    </div>

    <app-carousel />
</div>
