<mat-dialog-content>
    <mat-form-field class="full-width">
        <mat-label>Nombre de fiches</mat-label>
        <input matInput [(ngModel)]="number" />
    </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button matButton="filled" [mat-dialog-close]="number">Lancer la lecture d'oeuvre</button>
</mat-dialog-actions>
