@if (data.item.readOnly) {
    <h2 mat-dialog-title>Détails de l'institution</h2>
} @else if (isUpdatePage()) {
    <h2 mat-dialog-title>Modifier l'institution</h2>
} @else {
    <h2 mat-dialog-title>Créer une institution</h2>
}

<mat-dialog-content>
    <div class="nat-padding-vertical nat-gap-10 nat-vertical">
        <mat-form-field>
            <mat-label>Nom</mat-label>
            <input
                #name="ngModel"
                matInput
                fieldName="name"
                [appUnique]="data.item"
                [service]="service"
                [readonly]="data.item.readOnly || (isUpdatePage() && !data.item.permissions.update)"
                [(ngModel)]="data.item.name"
            />

            @if (name.invalid && (name?.dirty || name?.touched)) {
                <mat-error>Ce nom est déjà attribué</mat-error>
            }
        </mat-form-field>

        @if (data.item.street !== undefined) {
            <app-address
                [model]="data.item"
                [readonly]="data.item.readOnly || (isUpdatePage() && !data.item.permissions.update)"
            />
        }
    </div>
</mat-dialog-content>

<mat-dialog-actions>
    <app-dialog-footer
        class="nat-expand"
        [canCreate]="user?.globalPermissions?.institution?.create"
        [readOnly]="data.item.readOnly"
        [disableCreateAndUpdate]="!!name.invalid"
        [item]="data.item"
        (create)="create()"
        (delete)="delete()"
        (update)="update()"
    />
</mat-dialog-actions>
