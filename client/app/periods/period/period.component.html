@if (!isUpdatePage()) {
    <h2 mat-dialog-title>Créer une période</h2>
} @else if (data.item.readOnly || !data.item.permissions.update) {
    <h2 mat-dialog-title>Détails de la période</h2>
} @else {
    <h2 mat-dialog-title>Modifier la période</h2>
}

<mat-dialog-content>
    <div class="nat-padding-vertical nat-vertical">
        <mat-form-field>
            <mat-label>Nom</mat-label>
            <input
                matInput
                [readonly]="data.item.readOnly || (isUpdatePage() && !data.item.permissions.update)"
                [(ngModel)]="data.item.name"
            />
        </mat-form-field>

        <div class="nat-horizontal nat-gap">
            <mat-form-field [style.width]="'45%'">
                <mat-label>A partir de</mat-label>
                <input
                    type="number"
                    matInput
                    [readonly]="data.item.readOnly || (isUpdatePage() && !data.item.permissions.update)"
                    [(ngModel)]="data.item.from"
                />
            </mat-form-field>

            <mat-form-field [style.width]="'45%'">
                <mat-label>Jusqu'à</mat-label>
                <input
                    type="number"
                    matInput
                    [readonly]="data.item.readOnly || (isUpdatePage() && !data.item.permissions.update)"
                    [(ngModel)]="data.item.to"
                />
            </mat-form-field>
        </div>

        <natural-select-hierarchic
            placeholder="Période parente"
            [config]="hierarchicConfig"
            [filters]="ancestorsHierarchicFilters"
            [showIcon]="false"
            [disabled]="data.item.readOnly || (isUpdatePage() && !data.item.permissions.update)"
            [(ngModel)]="data.item.parent"
        />
    </div>
</mat-dialog-content>

<mat-dialog-actions>
    <app-dialog-footer
        class="nat-expand"
        [canCreate]="user?.globalPermissions?.period?.create"
        [readOnly]="data.item.readOnly"
        [item]="data.item"
        (create)="create()"
        (delete)="delete()"
        (update)="update()"
    />
</mat-dialog-actions>
