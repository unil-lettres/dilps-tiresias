<mat-toolbar class="nat-horizontal nat-align nat-gap">
    <app-logo [data]="{type: 'toolbar', class: 'logo'}" />

    <natural-search
        class="nat-expand"
        [facets]="naturalSearchFacets"
        [multipleGroups]="false"
        [selections]="naturalSearchSelections"
        (selectionChange)="search($event)"
    />
</mat-toolbar>

@if (dataSource) {
    <div class="nat-padding" style="padding-bottom: 120px !important">
        <div class="nat-horizontal nat-distribute nat-center">
            <app-navigable-breadcrumb rootLabel="Domaines" [breadcrumbs]="breadcrumbs" [getLink]="getBreadcrumbLink" />
            <button matButton="tonal" color="tertiary" (click)="add()">
                <mat-icon>add</mat-icon>
                Créer un domaine
            </button>
        </div>
        <div class="responsive-table nat-margin-top">
            <table mat-table matSort [dataSource]="dataSource" (matSortChange)="sorting([$event])">
                <tr *matHeaderRowDef="displayedColumns" mat-header-row></tr>
                <tr
                    *matRowDef="let row; columns: displayedColumns"
                    class="editable-row"
                    mat-row
                    (click)="edit(row.item)"
                ></tr>

                <ng-container matColumnDef="navigation">
                    <th *matHeaderCellDef mat-header-cell class="natural-3em-column"></th>
                    <td *matCellDef="let element; dataSource: dataSource" mat-cell (click)="$event.stopPropagation()">
                        @if (element.hasNavigation) {
                            <button matIconButton matTooltip="Déployer" [routerLink]="getChildLink(element.item)">
                                <mat-icon>chevron_right</mat-icon>
                            </button>
                        }
                    </td>
                </ng-container>
                <!-- Name Column -->

                <ng-container matColumnDef="name">
                    <th *matHeaderCellDef mat-header-cell mat-sort-header>Nom</th>
                    <td *matCellDef="let element; dataSource: dataSource" mat-cell>
                        <div class="nat-horizontal nat-align nat-gap">
                            {{ element.item.name }}
                            <mat-icon iconPositionEnd fontIcon="edit" class="icon-edit" />
                            @if (searched()) {
                                <app-collection-hierarchy [collection]="element.item" />
                            }
                        </div>
                    </td>
                </ng-container>

                <ng-container matColumnDef="usageCount">
                    <th
                        *matHeaderCellDef
                        mat-header-cell
                        mat-sort-header
                        class="natural-align-right"
                        arrowPosition="before"
                    >
                        Nombre de fiches
                    </th>
                    <td *matCellDef="let element; dataSource: dataSource" mat-cell class="natural-align-right">
                        {{ element.item.usageCount }}
                    </td>
                </ng-container>
            </table>
        </div>

        @if (showNoResults()) {
            <div class="nat-vertical nat-center nat-margin">Pas de résultats</div>
        }
        @if (!dataSource.data) {
            <div class="nat-margin nat-vertical nat-center">
                <mat-progress-spinner mode="indeterminate" [diameter]="40" />
            </div>
        }
        @if (dataSource.data?.length) {
            <mat-paginator
                [length]="dataSource.data?.length"
                [pageIndex]="dataSource.data?.pageIndex"
                [pageSizeOptions]="pageSizeOptions"
                [pageSize]="dataSource.data?.pageSize"
                (page)="pagination($event)"
            />
        }
    </div>
}
