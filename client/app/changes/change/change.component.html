<div class="containerWithToolbar nat-vertical nat-expand">
    <mat-toolbar class="main-toolbar nat-horizontal nat-align nat-gap">
        <app-logo [data]="{type: 'toolbar', class: 'logo'}" />
        <div class="nat-expand"></div>

        @if (user?.role === UserRole.administrator) {
            @if (change) {
                <button matButton="outlined" color="error" (click)="reject()">
                    <mat-icon naturalIcon="close" />
                    <span>Refuser la suggestion</span>
                </button>
            }
            @if (change) {
                <button matButton="filled" (click)="accept()">
                    <mat-icon naturalIcon="check" />
                    <span>Accepter la suggestion</span>
                </button>
            }
        }

        @if (!change && original) {
            <button matButton="filled" matTooltip="Soumettre la suggestion à validation" (click)="update()">
                <mat-icon naturalIcon="save" />
                <span>Soumettre</span>
            </button>
        }
        @if (!change && !original) {
            <button matButton="filled" matTooltip="Soumettre l'ajout de cette fiche à validation" (click)="create()">
                <mat-icon naturalIcon="add" />
                <span>Soumettre</span>
            </button>
        }
    </mat-toolbar>

    @if (loaded) {
        <div class="nat-horizontal nat-expand">
            <!-- Original -->
            @if (!original) {
                <div class="nat-expand nat-vertical nat-center">
                    <div class="mat-font-headline-lg">Nouvelle fiche</div>
                </div>
            } @else {
                <div class="card-original nat-vertical nat-expand">
                    <app-card class="nat-expand" title="Original" [fetchedModel]="original" />
                </div>
            }
            <!-- Suggestion -->
            @if (!suggestionInput) {
                <div class="nat-expand nat-vertical nat-center">
                    <div class="mat-font-headline-lg">Suppression de la fiche</div>
                </div>
            } @else {
                <div class="card-suggestion nat-vertical nat-expand">
                    <app-card
                        class="nat-expand"
                        title="Suggestion"
                        [model]="suggestionInput"
                        [fetchedModel]="fetchedSuggestion"
                        [editable]="true"
                        [showTools]="showTools"
                        [showCards]="false"
                        [showCode]="false"
                    />
                </div>
            }
        </div>
    }
</div>
