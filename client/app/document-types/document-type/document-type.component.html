<h2 mat-dialog-title>{{ isUpdatePage() ? 'Modifier le type de document' : 'Créer un type de document' }}</h2>

<mat-dialog-content>
    <div class="nat-padding-vertical nat-gap-10 nat-vertical">
        <mat-form-field>
            <mat-label>Nom</mat-label>
            <input matInput [readonly]="isUpdatePage() && !data.item.permissions.update" [(ngModel)]="data.item.name" />
        </mat-form-field>
    </div>
</mat-dialog-content>

<mat-dialog-actions>
    <app-dialog-footer
        class="nat-expand"
        [canCreate]="user?.globalPermissions?.documentType?.create"
        [canDelete]="data.item.canDelete"
        [item]="data.item"
        (create)="create()"
        (delete)="delete()"
        (update)="update()"
    />
</mat-dialog-actions>
