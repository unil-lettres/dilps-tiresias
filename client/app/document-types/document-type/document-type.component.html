@if (!isUpdatePage()) {
    <h2 mat-dialog-title>Créer un type de document</h2>
} @else if (data.item.readOnly || !data.item.permissions.update) {
    <h2 mat-dialog-title>Détails du type de document</h2>
} @else {
    <h2 mat-dialog-title>Modifier le type de document</h2>
}

<mat-dialog-content>
    <div class="nat-padding-vertical nat-vertical">
        <mat-form-field>
            <mat-label>Nom</mat-label>
            <input
                matInput
                [readonly]="data.item.readOnly || (isUpdatePage() && !data.item.permissions.update)"
                [(ngModel)]="data.item.name"
            />
        </mat-form-field>
    </div>
</mat-dialog-content>

<mat-dialog-actions>
    <app-dialog-footer
        class="nat-expand"
        [canCreate]="user?.globalPermissions?.documentType?.create"
        [readOnly]="data.item.readOnly"
        [item]="data.item"
        (create)="create()"
        (delete)="delete()"
        (update)="update()"
    />
</mat-dialog-actions>
