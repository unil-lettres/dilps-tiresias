@if (newses.length) {
    <div class="carousel-container">
        <div class="carousel-slides" [style.transform]="`translateX(-${currentIndex() * 100}%)`">
            @for (news of newses; track news) {
                <a
                    class="carousel-slide"
                    target="_blank"
                    [attr.href]="news.url"
                    [style.backgroundImage]="`url(${news.imageUrl})`"
                    [attr.aria-hidden]="currentIndex() !== $index"
                    [attr.tabindex]="currentIndex() === $index ? 0 : -1"
                >
                    <div class="carousel-label">
                        <h2 class="name nat-margin-bottom">{{ news.name }}</h2>
                        <p class="description mat-font-body-md">{{ news.description }}</p>
                    </div>
                </a>
            }
        </div>

        @if (newses.length > 1) {
            <button
                matIconButton
                class="carousel-nav carousel-nav-prev"
                type="button"
                aria-label="Actualité précédente"
                (click)="previous()"
            >
                <mat-icon naturalIcon="navigate_before" />
            </button>
            <button
                matIconButton
                class="carousel-nav carousel-nav-next"
                type="button"
                aria-label="Actualité suivante"
                (click)="next()"
            >
                <mat-icon naturalIcon="navigate_next" />
            </button>

            <div class="carousel-indicators">
                @for (news of newses; track news) {
                    <button
                        class="carousel-indicator"
                        type="button"
                        [class.active]="currentIndex() === $index"
                        [attr.aria-label]="`Aller à l'actualité ${$index + 1}`"
                        [attr.aria-current]="currentIndex() === $index ? 'true' : null"
                        (click)="goToSlide($index)"
                    ></button>
                }
            </div>
        }
    </div>
}
