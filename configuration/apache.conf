<IfModule mod_deflate.c>
    # Enable gzip compression
    AddOutputFilterByType DEFLATE text/plain text/xml text/css text/javascript application/x-javascript application/javascript application/ecmascript application/rss+xml image/svg+xml application/json application/hal+json
</IfModule>

<IfModule mod_expires.c>
    ExpiresActive on

    # No cache for index.html to ensure users always get the latest version of the app.
    <FilesMatch "index\.html$">
        ExpiresDefault "access plus 0 seconds"
        <IfModule mod_headers.c>
            Header set Cache-Control "no-cache, no-store, must-revalidate"
            Header set Pragma "no-cache"
            Header set Expires "0"
        </IfModule>
    </FilesMatch>

    # Long cache for compiled assets (CSS, JS, fonts) since they are fingerprinted and will change when their content changes.
    <FilesMatch "\.(css|js|otf|eot|ttf|woff|woff2)$">
        ExpiresDefault "access plus 1 year"
        <IfModule mod_headers.c>
            Header set Cache-Control "public, max-age=31536000, immutable"
        </IfModule>
    </FilesMatch>

    # 3. Medium cache for standard images.
    <FilesMatch "\.(svg|jpg|jpeg|png|gif|ico|webp)$">
        ExpiresDefault "access plus 6 hours"
    </FilesMatch>
</IfModule>

<IfModule mod_rewrite.c>
    RewriteEngine on

    # All PHP URL are redirected to PHP
    RewriteCond %{REQUEST_URI} ^/(graphql|auth|detail/?|api/.*)$
    RewriteRule .* /index.php [L,QSA]

    # Avoid "File name too long" issue when params > 255 characters
    RewriteCond %{REQUEST_URI} ^/(quizz.*)$
    RewriteRule .* /index.html [L,QSA]

    # If available serve pre-gzipped file
    RewriteCond %{HTTP:Accept-Encoding} gzip
    RewriteCond %{DOCUMENT_ROOT}%{REQUEST_FILENAME}.gz -f
    RewriteRule ^(.*)\.(js|css)$ $1.$2.gz [L,QSA]

    <FilesMatch "\.js\.gz$">
        ForceType text/javascript
        Header set Content-Encoding gzip
        Header append Vary Accept-Encoding
        SetEnv no-gzip 1
    </FilesMatch>

    <FilesMatch "\.css\.gz$">
        ForceType text/css
        Header set Content-Encoding gzip
        Header append Vary Accept-Encoding
        SetEnv no-gzip 1
    </FilesMatch>
</IfModule>

<IfVersion >= 2.2.16>
    # Everything else that does not exists on disk redirect to Angular
    DirectoryIndex /index.html
    FallbackResource /index.html
</IfVersion>
