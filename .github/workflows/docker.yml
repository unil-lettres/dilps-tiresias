name: docker
on:
    push:
        branches:
            - 'develop'
            - 'master'
permissions: read-all

jobs:
    build:
        name: Build
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - { arch: linux/amd64, os: ubuntu-latest }
                    - { arch: linux/arm64, os: ubuntu-24.04-arm }

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Build image
              uses: unil-lettres/actions/docker-build@main
              with:
                  dockerfile: ./dev/config/app.dockerfile
                  platform: ${{ matrix.arch }}
                  image_repository: ${{ vars.DOCKERHUB_REPOSITORY }}
                  name_prefix: app
                  dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
                  dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
                  context: ./dev/config

    merge:
        name: Merge
        runs-on: ubuntu-latest
        needs: [build]

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Download digests
              uses: actions/download-artifact@v4
              with:
                  path: ${{ runner.temp }}/digests
                  pattern: digests-*
                  merge-multiple: true

            - name: Merge digests
              uses: unil-lettres/actions/docker-merge@main
              with:
                  image_repository: ${{ vars.DOCKERHUB_REPOSITORY }}
                  tag: latest
                  dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
                  dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

    update-description:
        name: Update Description
        runs-on: ubuntu-latest
        needs: [merge]
        if: success()
        continue-on-error: false

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Update description
              uses: peter-evans/dockerhub-description@v4
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
                  repository: ${{ vars.DOCKERHUB_REPOSITORY }}
